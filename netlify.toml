[build]
  functions = "netlify/functions"

# PORT is not a real secret — its value (5000) is a substring of default
# numeric values in HTML inputs (e.g. 50000). ALPHA_VANTAGE_BASE_URL is a
# public URL, not a secret. Omit both from secrets scanning to unblock builds.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "PORT,ALPHA_VANTAGE_BASE_URL"

# Route /api/* to the corresponding serverless functions
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/stock/search"
  to = "/.netlify/functions/stock-search"
  status = 200

[[redirects]]
  from = "/api/stock/quote"
  to = "/.netlify/functions/stock-quote"
  status = 200

[[redirects]]
  from = "/api/stock/history"
  to = "/.netlify/functions/stock-history"
  status = 200

[[redirects]]
  from = "/api/market/news"
  to = "/.netlify/functions/market-news"
  status = 200
